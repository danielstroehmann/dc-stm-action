name: Sign notepad.exe with DigiCert STM

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Certificate
        run: |
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > /c/Certificate_pkcs12.p12
          echo "Certificate written, size:"
          wc -c /c/Certificate_pkcs12.p12
        shell: bash

      - name: Debug - Verify P12 certificate
        run: |
          echo === Checking file exists and size ===
          dir C:\Certificate_pkcs12.p12
          echo === certutil dump (structure check) ===
          certutil -dump C:\Certificate_pkcs12.p12
        shell: cmd

      - name: Install DigiCert SMTools and set environment variables
        run: |
          curl -X GET ${{ secrets.SM_HOST }}/signingmanager/api-ui/v1/releases/smtools-windows-x64.msi/download -H "x-api-key:${{ secrets.SM_API_KEY }}" -o smtools-windows-x64.msi
          msiexec /i smtools-windows-x64.msi /quiet /qn
          echo "SM_HOST=${{ secrets.SM_HOST }}" >> "%GITHUB_ENV%"
          echo "SM_API_KEY=${{ secrets.SM_API_KEY }}" >> "%GITHUB_ENV%"
          echo "SM_CLIENT_CERT_FILE=C:\Certificate_pkcs12.p12" >> "%GITHUB_ENV%"
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "%GITHUB_ENV%"
          echo C:\Program Files\DigiCert\DigiCert One Signing Manager Tools>> "%GITHUB_PATH%"
        shell: cmd

      - name: Debug - Verify env vars after install
        run: |
          echo SM_HOST=%SM_HOST%
          echo SM_CLIENT_CERT_FILE=%SM_CLIENT_CERT_FILE%
          echo SM_API_KEY first 4 chars: %SM_API_KEY:~0,4%
          echo SM_CLIENT_CERT_PASSWORD set: %SM_CLIENT_CERT_PASSWORD:~0,1%
          dir "%SM_CLIENT_CERT_FILE%"
          smctl healthcheck
        shell: cmd

      - name: Sync certificates to Windows certificate store
        run: smctl windows certsync
        shell: cmd

      - name: Copy notepad.exe
        run: copy C:\Windows\System32\notepad.exe notepad_unsigned.exe
        shell: cmd

      - name: Sign with smctl
        run: smctl sign --input notepad_unsigned.exe --keypair-alias ${{ secrets.SM_KEYPAIR_ALIAS }}
        shell: cmd

      - name: Verify signature
        run: signtool verify /v /pa notepad_unsigned.exe
        shell: cmd

      - name: Upload signed file
        uses: actions/upload-artifact@v4
        with:
          name: signed-notepad
          path: notepad_unsigned.exe
